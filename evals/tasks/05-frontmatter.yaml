# Frontmatter parsing — 6 tasks
---
id: fm-001
category: skill
difficulty: easy
description: Parse basic frontmatter with name and description
action: skill_parse_frontmatter
args:
  raw: |
    ---
    name: test-skill
    description: "A test skill"
    version: 1.0.0
    ---

    Body content here
assertions:
  - type: contains
    value: ["test-skill", "A test skill", "1.0.0"]
tags: [skill, frontmatter, parse]
