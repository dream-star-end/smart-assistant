id: session-006
category: session
difficulty: medium
description: Search returns snippet with match context
setup:
  - action: session_upsert
    args:
      id: eval-snippet-006
      agentId: eval-agent
      channel: eval
      peerId: eval-user
      title: Snippet test
  - action: session_index_turn
    args:
      sessionId: eval-snippet-006
      turnIdx: 0
      userText: ""
      assistantText: "The quick brown fox jumped over the lazy dog near SNIPPET_MARKER"
action: session_search
args:
  query: "SNIPPET_MARKER"
  limit: 1
assertions:
  - type: contains
    value: "snippet"
tags: [session, search, snippet]
