---
id: skill-val-006
category: security
difficulty: medium
description: Reject invalid agentId in SkillStore constructor
action: skill_store_construct
args:
  agentId: "../escape"
assertions:
  - type: contains
    value: '"ok":false'
  - type: contains
    value: "invalid agentId"
tags: [skill, security, path-traversal]
---
id: skill-val-007
category: security
difficulty: medium
description: Reject save with invalid version format
action: skill_save
args:
  agentId: eval-agent
  name: bad-version
  description: Bad version test
  version: "../1.0"
  body: "test"
assertions:
  - type: contains
    value: '"ok":false'
  - type: contains
    value: "invalid version"
tags: [skill, security, version]
---
id: skill-val-008
category: security
difficulty: medium
description: Reject restore with invalid version format
setup:
  - action: cleanup
    args: { agentId: eval-agent }
  - action: skill_save
    args:
      agentId: eval-agent
      name: restore-sec
      description: Restore security test
      body: "test"
action: skill_restore
args:
  agentId: eval-agent
  name: restore-sec
  version: "../../../etc/passwd"
assertions:
  - type: contains
    value: '"ok":false'
  - type: contains
    value: "invalid version"
tags: [skill, security, path-traversal]
