---
id: cost-004
category: cost
difficulty: easy
description: Usage summary returns zeros for unknown agent
action: usage_summary
args:
  agentId: nonexistent-agent-xyz
assertions:
  - type: contains
    value: '"totalCostUsd":0'
  - type: contains
    value: '"totalTurns":0'
tags: [cost, summary, negative]
---
id: event-005
category: event
difficulty: easy
description: Duplicate event insert is idempotent (OR IGNORE)
setup:
  - action: event_insert
    args:
      id: eval-event-005-dup
      type: turn.completed
      timestamp: 1700000000000
      agentId: eval-agent
      sessionKey: ""
      schemaVersion: 1
      payload: '{"first":true}'
action: event_insert
args:
  id: eval-event-005-dup
  type: turn.completed
  timestamp: 1700000000000
  agentId: eval-agent
  sessionKey: ""
  schemaVersion: 1
  payload: '{"first":false}'
assertions:
  - type: contains
    value: '"ok":true'
tags: [event, idempotent]
