setup:
  - action: usage_insert
    args:
      id: eval-usage-003a
      sessionId: cost-session-A
      agentId: cost-agent-003
      turnIndex: 0
      model: eval-model
      inputTokens: 500
      outputTokens: 250
      cacheReadTokens: 0
      cacheCreationTokens: 0
      costUsd: 0.02
      durationMs: 1000
      toolCalls: 0
      timestamp: 1700000000000
  - action: usage_insert
    args:
      id: eval-usage-003b
      sessionId: cost-session-B
      agentId: cost-agent-003
      turnIndex: 0
      model: eval-model
      inputTokens: 10000
      outputTokens: 5000
      cacheReadTokens: 0
      cacheCreationTokens: 0
      costUsd: 1.50
      durationMs: 10000
      toolCalls: 5
