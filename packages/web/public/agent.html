<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>OpenClaude · Agent</title>
<style>
/* ══════════════════════════════════════════════════════════════════
   OpenClaude 商用版 · Agent 前端 (T-71 redesign)
   与 app.html 共用视觉体系:品牌橙 + 温暖暗色 + 毛玻璃卡片。
   ══════════════════════════════════════════════════════════════════ */
:root{
  --bg-0:#0b0a10;--bg-1:#141320;--bg-2:#1c1b2c;--bg-3:#262538;
  --bg-hover:rgba(255,255,255,.04);
  --fg-0:#f5f4f8;--fg-1:#cfcedb;--fg-2:#8e8ca5;--fg-3:#5a5872;
  --brand-500:#d97757;--brand-400:#e89074;--brand-300:#f0a990;
  --brand-600:#bd5d3b;--brand-700:#9a4a2e;
  --brand-glow:rgba(217,119,87,.38);--brand-glow-soft:rgba(217,119,87,.16);
  --ok:#4ade80;--ok-bg:rgba(74,222,128,.12);
  --err:#f87171;--err-bg:rgba(248,113,113,.12);
  --warn:#fbbf24;--warn-bg:rgba(251,191,36,.12);
  --info:#60a5fa;
  --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.14);
  --r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-full:999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35);
  --shadow-md:0 4px 20px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 20px 60px rgba(0,0,0,.55),0 8px 20px rgba(0,0,0,.35);
  --shadow-brand:0 12px 32px var(--brand-glow);
  --font-sans:-apple-system,BlinkMacSystemFont,"PingFang SC","HarmonyOS Sans","Microsoft YaHei",system-ui,"Segoe UI",Roboto,sans-serif;
  --font-mono:"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --ease:cubic-bezier(.22,1,.36,1);--dur:.24s;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg-0);color:var(--fg-0);
  font-family:var(--font-sans);font-size:14.5px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  background-image:
    radial-gradient(1100px 720px at 12% -10%,rgba(217,119,87,.18),transparent 55%),
    radial-gradient(900px 640px at 95% 105%,rgba(123,88,193,.2),transparent 58%),
    radial-gradient(700px 520px at 50% 50%,rgba(30,25,60,.5),transparent 70%);
  background-attachment:fixed;
}
::selection{background:var(--brand-glow-soft);color:var(--fg-0)}

button{
  font:inherit;color:var(--fg-0);
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:9px 16px;cursor:pointer;
  transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
  font-weight:500;letter-spacing:.01em;
}
button:hover:not(:disabled){background:var(--bg-hover);border-color:var(--line-strong)}
button:active:not(:disabled){transform:translateY(1px)}
button:disabled{opacity:.45;cursor:not-allowed}
button.primary{
  background:linear-gradient(135deg,var(--brand-500),var(--brand-600));
  border-color:transparent;color:#fff;
  box-shadow:0 6px 18px var(--brand-glow-soft),inset 0 1px 0 rgba(255,255,255,.15);
}
button.primary:hover:not(:disabled){
  box-shadow:var(--shadow-brand),inset 0 1px 0 rgba(255,255,255,.18);
  transform:translateY(-1px);
}
button.ghost{background:transparent;border-color:var(--line)}
button.link{background:transparent;border:0;color:var(--brand-400);padding:0;text-decoration:underline;text-underline-offset:3px;cursor:pointer}

input,textarea{
  font:inherit;color:var(--fg-0);
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:12px 14px;width:100%;
  transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
input::placeholder,textarea::placeholder{color:var(--fg-3)}
input:focus,textarea:focus{
  outline:0;border-color:var(--brand-500);background:rgba(255,255,255,.05);
  box-shadow:0 0 0 4px var(--brand-glow-soft);
}

.hidden{display:none!important}
.muted{color:var(--fg-2)}
.dim{color:var(--fg-3)}
.err{color:var(--err)}
.ok{color:var(--ok)}
.warn{color:var(--warn)}
.row{display:flex;gap:12px;align-items:center}

code{font-family:var(--font-mono);font-size:.88em;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;color:var(--brand-300)}

/* ── Shell ─────────────────────────── */
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{
  display:flex;align-items:center;gap:18px;
  padding:12px 20px;
  background:rgba(20,19,32,.78);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;letter-spacing:-.005em}
.logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--brand-500),var(--brand-700));
  display:grid;place-items:center;
  box-shadow:0 4px 12px var(--brand-glow-soft);
  position:relative;
}
.logo-mark::after{
  content:"";position:absolute;inset:1px;border-radius:7px;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.3),transparent 55%);
  pointer-events:none;
}
.logo-mark svg{position:relative;z-index:1}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);padding:4px;border-radius:var(--r-sm);border:1px solid var(--line)}
.tabs a{
  background:transparent;border:0;padding:6px 14px;border-radius:7px;
  color:var(--fg-2);font-size:13.5px;font-weight:500;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  transition:color var(--dur) var(--ease),background var(--dur) var(--ease);
}
.tabs a:hover{color:var(--fg-0);background:rgba(255,255,255,.04)}
.tabs a.on{
  background:linear-gradient(135deg,rgba(217,119,87,.22),rgba(217,119,87,.1));
  color:var(--brand-300);
  box-shadow:inset 0 0 0 1px rgba(217,119,87,.3);
}
.grow{flex:1}
.bal-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:var(--r-full);
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.22);
  font-family:var(--font-mono);font-size:12.5px;color:var(--fg-1);
}
.bal-pill strong{color:var(--ok);font-weight:700;font-size:13.5px}
.bal-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.me-email{font-size:12.5px;color:var(--fg-2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;overflow:auto;padding:32px 20px}

@media (max-width:640px){
  .topbar{padding:10px 12px;gap:10px;flex-wrap:wrap}
  .me-email{display:none}
  .tabs a{padding:6px 10px;font-size:12.5px}
}

/* ── 状态卡 ─────────────────────────── */
.card{
  background:rgba(28,27,44,.55);
  border:1px solid var(--line-strong);
  border-radius:var(--r-lg);
  padding:32px;max-width:680px;margin:0 auto;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-md);
  animation:fadeUp .4s var(--ease);
}
.card-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px}
.card-icon{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(217,119,87,.22),rgba(217,119,87,.08));
  border:1px solid rgba(217,119,87,.3);
  display:grid;place-items:center;color:var(--brand-300);
}
.card h2{margin:0 0 4px;font-size:20px;font-weight:700;letter-spacing:-.01em}
.card .lead{color:var(--fg-2);font-size:14px;line-height:1.65;margin:0}
.kv{
  display:grid;grid-template-columns:max-content 1fr;gap:10px 24px;
  font-size:13.5px;margin:20px 0;
  padding:16px 18px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:var(--r-md);
}
.kv dt{color:var(--fg-2);font-weight:500}
.kv dd{margin:0;font-family:var(--font-mono);color:var(--fg-0);word-break:break-all}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:var(--r-full);
  font-size:12px;font-weight:500;
  background:rgba(255,255,255,.06);color:var(--fg-1);
  border:1px solid var(--line-strong);
}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--fg-3)}
.badge.ok{background:var(--ok-bg);color:var(--ok);border-color:rgba(74,222,128,.28)}
.badge.ok::before{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.badge.err{background:var(--err-bg);color:var(--err);border-color:rgba(248,113,113,.28)}
.badge.err::before{background:var(--err)}
.badge.warn{background:var(--warn-bg);color:var(--warn);border-color:rgba(251,191,36,.28)}
.badge.warn::before{background:var(--warn);animation:pulse 1.6s ease-in-out infinite}

@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

.spinner{
  display:inline-block;width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.2);border-top-color:var(--brand-400);
  animation:spin .7s linear infinite;vertical-align:-2px;
}

/* ── 会话窗 ─────────────────────────── */
.status-bar{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:rgba(20,19,32,.7);
  backdrop-filter:blur(12px);
  border:1px solid var(--line);
  border-radius:var(--r-md) var(--r-md) 0 0;
  font-size:12.5px;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--fg-3);
  transition:background var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
.status-dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.status-dot.err{background:var(--err);box-shadow:0 0 8px var(--err)}

.term-wrap{display:flex;flex-direction:column;max-width:960px;margin:0 auto;height:calc(100vh - 120px);animation:fadeUp .3s var(--ease)}
.term{
  flex:1;overflow-y:auto;padding:16px 18px;
  background:linear-gradient(180deg,rgba(11,10,20,.85),rgba(11,10,20,.95));
  border:1px solid var(--line);border-top:0;border-bottom:0;
  font-family:var(--font-mono);font-size:12.8px;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
}
.term::-webkit-scrollbar{width:10px}
.term::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
.term::-webkit-scrollbar-thumb:hover{background:var(--fg-3);background-clip:padding-box;border:2px solid transparent}
.term .ln{margin:0 0 2px;padding:2px 0;border-radius:3px}
.term .ln.in{color:var(--brand-300)}
.term .ln.frame{color:var(--fg-1)}
.term .ln.err{color:var(--err);background:rgba(248,113,113,.06);padding:2px 6px;margin-left:-6px;margin-right:-6px}
.term .ln.sys{color:var(--fg-3);font-style:italic}

.compose{
  display:flex;gap:10px;align-items:flex-end;
  padding:12px;
  background:rgba(20,19,32,.7);
  backdrop-filter:blur(12px);
  border:1px solid var(--line);border-top:0;
  border-radius:0 0 var(--r-md) var(--r-md);
}
.compose-inner{
  flex:1;display:flex;gap:8px;align-items:flex-end;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line-strong);
  border-radius:var(--r-sm);
  padding:4px 4px 4px 6px;
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
.compose-inner:focus-within{border-color:var(--brand-500);box-shadow:0 0 0 4px var(--brand-glow-soft)}
.compose textarea{
  font-family:var(--font-mono);font-size:12.8px;
  resize:none;min-height:40px;max-height:160px;
  background:transparent;border:0;padding:10px 10px;
}
.compose textarea:focus{box-shadow:none;background:transparent}
.compose button.primary{padding:10px 18px;min-height:40px}

/* ── Toast ─────────────────────────── */
.toast{
  position:fixed;top:20px;right:20px;
  background:rgba(28,27,44,.92);backdrop-filter:blur(16px);
  border:1px solid var(--line-strong);
  border-radius:var(--r-md);
  padding:12px 18px;max-width:380px;font-size:13.5px;
  box-shadow:var(--shadow-lg);
  opacity:0;transform:translateY(-12px);
  transition:opacity .24s var(--ease),transform .24s var(--ease);
  z-index:1000;pointer-events:none;
}
.toast.on{opacity:1;transform:none}
.toast.err{border-color:rgba(248,113,113,.4);color:var(--err);background:rgba(60,20,22,.92)}
.toast.ok{border-color:rgba(74,222,128,.35);color:var(--ok);background:rgba(22,46,30,.92)}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="logo-mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 18 L10 6 L14 6 L18 18 M9 14 L15 14" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>OpenClaude</span>
    </div>
    <nav class="tabs">
      <a href="/app.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 5 L20 5 L20 17 L13 17 L8 21 L8 17 L4 17 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        对话
      </a>
      <a href="/agent.html" class="on">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 9 L10 12 L7 15 M13 16 L17 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Agent
      </a>
    </nav>
    <div class="grow"></div>
    <div class="bal-pill"><span>余额</span><strong id="bal-credits">—</strong><span>积分</span></div>
    <div class="me-email" id="me-email"></div>
    <button id="logout-btn" class="ghost">登出</button>
  </header>
  <main class="main" id="content"></main>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";

// ═════════════════════════════════════════════════════════════════
// 与 app.html 共用的 localStorage key — 用户登录过 /app.html 就能直接进来。
// ═════════════════════════════════════════════════════════════════

const TOKEN_KEY       = "openclaude_app_token";
const REFRESH_KEY     = "openclaude_app_refresh";
const ACCESS_EXP_KEY  = "openclaude_app_access_exp";
const USER_KEY        = "openclaude_app_user";
const REFRESH_SKEW_SEC = 60;

// ─── Agent 会话历史持久化(T-71 验收:关闭 24h 后历史仍在)──────────
// 存 localStorage,按用户 ID 分桶,>24h 自动 drop。
const AGENT_LINES_KEY_PREFIX = "openclaude_agent_lines_";   // + uid
const AGENT_LINES_TTL_MS = 24 * 60 * 60 * 1000;
const AGENT_LINES_MAX = 2000;                                // 软上限,防止爆 quota

const $ = (id) => document.getElementById(id);

function el(tag, props, children) {
  const n = document.createElement(tag);
  if (props) {
    for (const [k, v] of Object.entries(props)) {
      if (v === null || v === undefined || v === false) continue;
      if (k === "class") n.className = v;
      else if (k.startsWith("on")) n.addEventListener(k.slice(2).toLowerCase(), v);
      else n.setAttribute(k, v);
    }
  }
  for (const c of [].concat(children ?? [])) {
    if (c === null || c === undefined || c === false) continue;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
}

/** 内联 SVG 图标 —— path 字符串来自代码本地,安全。*/
function icon(pathHtml, size) {
  const s = size || 16;
  const w = el("span", { style: "display:inline-flex;line-height:0" });
  w.innerHTML = `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" aria-hidden="true">${pathHtml}</svg>`;
  return w;
}

function toast(msg, kind) {
  const t = $("toast"); t.textContent = msg;
  t.className = "toast on" + (kind ? " " + kind : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = "toast", 3200);
}

function unwrapSuccess(body) {
  if (body && typeof body === "object" && body.ok === true && "data" in body) return body.data;
  return body;
}
function extractError(body, status) {
  if (body && typeof body === "object" && body.error && typeof body.error === "object") {
    return { code: body.error.code || `HTTP_${status}`, message: body.error.message || `HTTP ${status}` };
  }
  return { code: `HTTP_${status}`, message: `HTTP ${status}` };
}

async function maybeRefresh() {
  const expRaw = localStorage.getItem(ACCESS_EXP_KEY);
  const refresh = localStorage.getItem(REFRESH_KEY);
  if (!expRaw || !refresh) return;
  const expSec = Number(expRaw);
  if (!Number.isFinite(expSec) || expSec <= 0) return;
  if (expSec * 1000 - Date.now() > REFRESH_SKEW_SEC * 1000) return;
  let res;
  try {
    res = await fetch("/api/auth/refresh", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ refresh_token: refresh }),
    });
  } catch {
    // 网络抖动 / 离线 —— 不强行清会话,后续请求若拿到 401 再清。
    return;
  }
  if (res.ok) {
    try {
      const data = unwrapSuccess(await res.json());
      if (data?.access_token) localStorage.setItem(TOKEN_KEY, data.access_token);
      if (data?.access_exp) localStorage.setItem(ACCESS_EXP_KEY, String(data.access_exp));
    } catch { /* body 损坏也不清会话 */ }
    return;
  }
  // 只有明确的 401/400(refresh 无效/不存在)才清 session
  if (res.status === 401 || res.status === 400 || res.status === 404) {
    clearSessionAndRedirect();
  }
  // 5xx/429 等:保留会话,等下次请求再试
}

function clearSessionAndRedirect() {
  // 登出:清同账号下会话历史(未登录态下保留也无意义,且下一位用户登入会复用 key)
  try { clearAgentLines(); } catch { /* ignore */ }
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(REFRESH_KEY);
  localStorage.removeItem(ACCESS_EXP_KEY);
  localStorage.removeItem(USER_KEY);
  stopPoll();
  // 未登录态 → 回主 app 页让用户登录
  location.href = "/app.html";
}

async function api(path, opts = {}) {
  const { method = "GET", body = null, auth = true } = opts;
  if (auth) await maybeRefresh();
  const headers = {};
  if (body !== null) headers["content-type"] = "application/json";
  if (auth) {
    const tok = localStorage.getItem(TOKEN_KEY);
    if (!tok) { clearSessionAndRedirect(); throw new Error("NOT_AUTHENTICATED"); }
    headers["authorization"] = `Bearer ${tok}`;
  }
  const res = await fetch(path, { method, headers, body: body === null ? null : JSON.stringify(body) });
  let data = null;
  if (res.status !== 204) { try { data = await res.json(); } catch { data = null; } }
  if (!res.ok) {
    if (auth && res.status === 401) clearSessionAndRedirect();
    const e = extractError(data, res.status);
    const err = new Error(e.message); err.code = e.code; err.status = res.status;
    throw err;
  }
  return unwrapSuccess(data);
}

async function doLogout() {
  const refresh = localStorage.getItem(REFRESH_KEY);
  if (refresh) {
    try {
      await fetch("/api/auth/logout", { method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ refresh_token: refresh }) });
    } catch { /* ignore */ }
  }
  clearSessionAndRedirect();
}

async function refreshMe() {
  try {
    const r = await api("/api/me");
    const u = r.user ?? r;
    $("me-email").textContent = u.email ?? "";
    $("bal-credits").textContent = u.credits ?? "?";
    // 同步写入 USER_KEY —— agentLinesKey() 依赖它做分桶,否则登录后
    // /api/me 尚未回写 USER_KEY 时会退化到 guest 桶,串历史给下一用户。
    try { localStorage.setItem(USER_KEY, JSON.stringify(u)); } catch { /* ignore */ }
  } catch (e) {
    if (e.code !== "NOT_AUTHENTICATED") toast("加载个人资料失败: " + e.message, "err");
  }
}

// ═════════════════════════════════════════════════════════════════
// 状态视图
// ═════════════════════════════════════════════════════════════════

let currentStatus = null;
let statusPollTimer = null;

function statusBadge(s) {
  const ok = ["running", "active"];
  const err = ["error", "expired", "canceled"];
  const warn = ["provisioning", "starting", "restarting", "stopping"];
  const cls = ok.includes(s) ? "ok" : err.includes(s) ? "err" : warn.includes(s) ? "warn" : "";
  return el("span", { class: `badge ${cls}` }, s);
}

async function loadStatus() {
  const content = $("content");
  content.innerHTML = "";
  content.appendChild(el("div", { class: "muted", style: "text-align:center;padding:40px" }, [
    el("span", { class: "spinner" }), " 加载 Agent 状态…",
  ]));
  try {
    const r = await api("/api/agent/status");
    currentStatus = r;
    renderStatus(r);
  } catch (e) {
    content.innerHTML = "";
    content.appendChild(el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [
        el("div", { class: "card-icon" }, icon('<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 8 L12 13 M12 16 L12 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>', 24)),
        el("div", {}, [
          el("h2", {}, "加载失败"),
          el("p", { class: "lead err" }, `[${e.code || "?"}] ${e.message}`),
        ]),
      ]),
      el("div", { class: "row", style: "margin-top:16px" }, [
        el("button", { class: "primary", onclick: () => loadStatus() }, "重试"),
      ]),
    ]));
  }
}

function renderStatus(r) {
  const content = $("content");
  content.innerHTML = "";

  if (!r.runtime_ready) {
    content.appendChild(el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [
        el("div", { class: "card-icon" }, icon('<path d="M12 2 L2 7 L12 12 L22 7 Z M2 17 L12 22 L22 17 M2 12 L12 17 L22 12" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>', 24)),
        el("div", {}, [
          el("h2", {}, "Agent 服务暂不可用"),
          el("p", { class: "lead" }, "后台尚未配置 Agent 运行时(Docker 镜像 / 网络 / 代理)。请联系管理员完成部署后再试。"),
        ]),
      ]),
    ]));
    return;
  }

  if (!r.subscription) {
    renderOpenCard(content);
    return;
  }

  // 已订阅
  const sub = r.subscription;
  const c = r.container;
  const card = el("div", { class: "card" });

  card.appendChild(el("div", { class: "card-head" }, [
    el("div", { class: "card-icon" }, icon('<rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 9 L10 12 L7 15 M13 16 L17 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>', 24)),
    el("div", {}, [
      el("h2", {}, "Agent 已开通"),
      el("p", { class: "lead" }, "你的专属沙盒环境已就绪,可以开始协作"),
    ]),
  ]));

  const kv = el("dl", { class: "kv" });
  kv.appendChild(el("dt", {}, "订阅 ID")); kv.appendChild(el("dd", {}, String(sub.id)));
  kv.appendChild(el("dt", {}, "套餐")); kv.appendChild(el("dd", {}, sub.plan));
  kv.appendChild(el("dt", {}, "状态")); kv.appendChild(el("dd", {}, [statusBadge(sub.status)]));
  kv.appendChild(el("dt", {}, "到期时间")); kv.appendChild(el("dd", {}, new Date(sub.end_at).toLocaleString("zh-CN", { hour12: false })));
  kv.appendChild(el("dt", {}, "自动续费")); kv.appendChild(el("dd", {}, sub.auto_renew ? "已开启" : "已关闭"));
  if (c) {
    kv.appendChild(el("dt", {}, "容器"));
    kv.appendChild(el("dd", {}, c.docker_name || String(c.id)));
    kv.appendChild(el("dt", {}, "容器状态"));
    kv.appendChild(el("dd", {}, [statusBadge(c.status)]));
    if (c.last_error) {
      kv.appendChild(el("dt", {}, "最近错误"));
      kv.appendChild(el("dd", { class: "err" }, c.last_error));
    }
  }
  card.appendChild(kv);

  const actions = el("div", { class: "row", style: "margin-top:20px;flex-wrap:wrap" });
  const canChat = c?.status === "running";
  const chatBtn = el("button", {
    class: "primary",
    disabled: canChat ? undefined : "disabled",
    onclick: () => startAgentChat(),
  }, canChat ? [icon('<path d="M5 12 L19 12 M13 6 L19 12 L13 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>', 14), " 进入会话窗"]
            : [el("span", { class: "spinner" }), " 等待容器就绪…"]);
  actions.appendChild(chatBtn);
  if (sub.auto_renew) {
    actions.appendChild(el("button", { onclick: () => cancelAutoRenew() }, "取消自动续费"));
  }
  actions.appendChild(el("button", { class: "ghost", onclick: () => loadStatus() }, "刷新"));
  card.appendChild(actions);

  content.appendChild(card);

  // provisioning / starting 时轮询
  if (!canChat && ["provisioning", "starting", "restarting"].includes(c?.status || "")) {
    schedulePoll();
  } else {
    stopPoll();
  }
}

function renderOpenCard(content) {
  const card = el("div", { class: "card" });
  card.appendChild(el("div", { class: "card-head" }, [
    el("div", { class: "card-icon" }, icon('<rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 9 L10 12 L7 15 M13 16 L17 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>', 24)),
    el("div", {}, [
      el("h2", {}, "开通 Agent"),
      el("p", { class: "lead" }, "Agent 是你的专属 Docker 沙盒 —— 你说一句,它可以读写文件、跑 shell、调工具。一次开通 30 天有效,一次性扣积分。"),
    ]),
  ]));

  // 特性列表
  const feats = el("div", { style: "display:grid;gap:12px;margin:20px 0" });
  const featItems = [
    ["真实 shell 环境", "完整 Linux 用户态,支持任意命令和脚本"],
    ["持久会话", "容器在订阅期内常驻,24h 内关闭浏览器会话自动恢复"],
    ["安全隔离", "seccomp + 网络代理,单租户容器互不影响"],
  ];
  for (const [t, d] of featItems) {
    feats.appendChild(el("div", { class: "row", style: "gap:12px;align-items:flex-start" }, [
      el("div", { style: "width:20px;height:20px;flex-shrink:0;margin-top:3px;color:var(--ok)" },
        icon('<path d="M5 12 L10 17 L20 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>', 18)),
      el("div", {}, [
        el("strong", { style: "font-weight:600" }, t),
        el("span", { style: "color:var(--fg-2);margin-left:8px;font-size:13.5px" }, d),
      ]),
    ]));
  }
  card.appendChild(feats);

  const actions = el("div", { class: "row", style: "margin-top:4px;flex-wrap:wrap" });
  actions.appendChild(el("button", { class: "primary", onclick: () => doOpen() }, [
    icon('<path d="M12 5 L12 19 M5 12 L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>', 14),
    " 立即开通",
  ]));
  actions.appendChild(el("a", { href: "/app.html", class: "link", style: "margin-left:8px" }, "→ 先去充值"));
  card.appendChild(actions);
  content.appendChild(card);
}

async function doOpen() {
  const btns = document.querySelectorAll(".card button");
  btns.forEach((b) => b.disabled = true);
  try {
    await api("/api/agent/open", { method: "POST", body: { plan: "basic" } });
    toast("开通成功,容器启动中…", "ok");
    await refreshMe();
    await loadStatus();
  } catch (e) {
    toast(`[${e.code || "?"}] ${e.message}`, "err");
    if (e.code === "ERR_INSUFFICIENT_CREDITS") {
      location.href = "/app.html";
    }
    btns.forEach((b) => b.disabled = false);
  }
}

async function cancelAutoRenew() {
  if (!confirm("取消自动续费?当前订阅期内 Agent 仍可正常使用,到期后不再扣积分。")) return;
  try {
    await api("/api/agent/cancel", { method: "POST" });
    toast("已取消自动续费", "ok");
    await loadStatus();
  } catch (e) {
    toast(`[${e.code || "?"}] ${e.message}`, "err");
  }
}

function schedulePoll() {
  stopPoll();
  statusPollTimer = setInterval(() => loadStatus(), 4000);
}
function stopPoll() {
  if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
}

// ═════════════════════════════════════════════════════════════════
// 会话窗(简版 terminal/chat)
// ═════════════════════════════════════════════════════════════════

let agentWs = null;
let agentLines = []; // {kind:"in"|"frame"|"sys"|"err", text}
let agentLinesLoaded = false;

/** 返回当前用户的历史 key;拿不到稳定 uid 就返 null(不落盘,不读盘),
 *  避免多个账号共用 "guest" 桶把历史串给下一个登录用户。 */
function agentLinesKey() {
  let u;
  try { u = JSON.parse(localStorage.getItem(USER_KEY) || "null"); }
  catch { return null; }
  const tag = u?.id ?? u?.email;
  if (!tag || typeof tag !== "string" && typeof tag !== "number") return null;
  return AGENT_LINES_KEY_PREFIX + String(tag);
}

function loadAgentLines() {
  if (agentLinesLoaded) return;
  agentLinesLoaded = true;
  const key = agentLinesKey();
  if (!key) return;
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (!obj || typeof obj !== "object" || !Array.isArray(obj.lines)) return;
    const savedAt = Number(obj.saved_at) || 0;
    if (Date.now() - savedAt > AGENT_LINES_TTL_MS) {
      localStorage.removeItem(key);
      return;
    }
    agentLines = obj.lines.filter((l) =>
      l && typeof l.kind === "string" && typeof l.text === "string").slice(-AGENT_LINES_MAX);
  } catch { /* ignore 损坏 */ }
}

let _persistTimer = null;
function persistAgentLines() {
  if (_persistTimer) return;
  _persistTimer = setTimeout(() => {
    _persistTimer = null;
    const key = agentLinesKey();
    if (!key) return; // 没稳定 uid → 本会话不落盘,宁可丢也不串号
    try {
      localStorage.setItem(key, JSON.stringify({
        saved_at: Date.now(),
        lines: agentLines,
      }));
    } catch { /* quota exceeded 就算了,内存里的还在 */ }
  }, 400);
}

function clearAgentLines() {
  agentLines = [];
  const key = agentLinesKey();
  if (!key) return;
  try { localStorage.removeItem(key); } catch { /* ignore */ }
}

function startAgentChat() {
  stopPoll();
  const content = $("content");
  content.innerHTML = "";

  const wrap = el("div", { class: "term-wrap" });
  const statusBar = el("div", { class: "status-bar" }, [
    el("div", { class: "status-dot", id: "ws-dot" }),
    el("span", { id: "ws-text", class: "muted" }, "未连接"),
    el("span", { class: "grow" }),
    el("button", { onclick: () => { closeAgentWs(); loadStatus(); }, class: "ghost", style: "font-size:12px;padding:5px 12px" }, [
      icon('<path d="M19 12 L5 12 M11 6 L5 12 L11 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>', 12),
      " 返回",
    ]),
  ]);
  wrap.appendChild(statusBar);

  const term = el("div", { class: "term", id: "agent-term" });
  wrap.appendChild(term);

  const compose = el("div", { class: "compose" });
  const inner = el("div", { class: "compose-inner" });
  const ta = el("textarea", { id: "agent-input", placeholder: "输入消息后 Enter 发送 (以 { 开头会按 raw JSON 发送,便于调试)", rows: "1" });
  const send = el("button", { class: "primary", id: "agent-send", onclick: sendAgentFrame }, [
    icon('<path d="M4 12 L20 4 L14 20 L11 13 Z" stroke="currentColor" stroke-width="1.8" fill="currentColor" stroke-linejoin="round"/>', 14),
    " 发送",
  ]);
  inner.appendChild(ta);
  compose.appendChild(inner);
  compose.appendChild(send);
  wrap.appendChild(compose);

  content.appendChild(wrap);

  // restore 历史 —— 只渲染快照,不回写 state。
  // Why: 原来直接 `for (const l of agentLines) appendLine(...)`,而 appendLine 内又 push
  // 到 agentLines → 数组边迭代边生长 → 第二次进入会话窗无限扩张把页面冻死。
  for (const l of agentLines.slice()) renderLine(l.kind, l.text);

  ta.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); sendAgentFrame(); }
  });
  ta.addEventListener("input", () => {
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
  });

  openAgentWs();
}

/** 只画到 DOM,不动 state。*/
function renderLine(kind, text) {
  const term = $("agent-term");
  if (!term) return;
  const prefix = kind === "in" ? "› " : kind === "frame" ? "  " : kind === "err" ? "! " : "# ";
  term.appendChild(el("div", { class: `ln ${kind}` }, prefix + text));
  term.scrollTop = term.scrollHeight;
}

/** 实时新帧:推入 state + 渲染 + 落盘。*/
function appendLine(kind, text) {
  agentLines.push({ kind, text });
  if (agentLines.length > AGENT_LINES_MAX) {
    agentLines.splice(0, agentLines.length - AGENT_LINES_MAX);
  }
  renderLine(kind, text);
  persistAgentLines();
}

function setWsStatus(text, kind) {
  const dot = $("ws-dot"); const txt = $("ws-text");
  if (!dot || !txt) return;
  dot.className = "status-dot" + (kind ? " " + kind : "");
  txt.textContent = text;
}

function openAgentWs() {
  const tok = localStorage.getItem(TOKEN_KEY);
  if (!tok) { clearSessionAndRedirect(); return; }
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = `${proto}//${location.host}/ws/agent?token=${encodeURIComponent(tok)}`;
  setWsStatus("连接中…");
  const ws = new WebSocket(url);
  agentWs = ws;
  ws.onopen = () => setWsStatus("已连接,等待会话开启", "on");
  ws.onmessage = (ev) => {
    let f; try { f = JSON.parse(ev.data); } catch { appendLine("err", `非 JSON 帧: ${ev.data}`); return; }
    if (f.type === "open") {
      setWsStatus(`会话已开启 · session=${f.session_id}`, "on");
      appendLine("sys", `session ${f.session_id}`);
    } else if (f.type === "frame") {
      try { appendLine("frame", JSON.stringify(f.data)); }
      catch { appendLine("frame", String(f.data)); }
    } else if (f.type === "error") {
      appendLine("err", `[${f.code}] ${f.message}`);
      setWsStatus(`错误: ${f.code}`, "err");
    } else if (f.type === "close") {
      appendLine("sys", `close: ${f.reason}`);
    } else {
      appendLine("frame", JSON.stringify(f));
    }
  };
  ws.onerror = () => setWsStatus("连接错误", "err");
  ws.onclose = (ev) => {
    setWsStatus(`已断开 (code=${ev.code})`);
    agentWs = null;
  };
}

function closeAgentWs() {
  if (agentWs) { try { agentWs.close(1000); } catch { /* ignore */ } agentWs = null; }
}

function sendAgentFrame() {
  const ta = $("agent-input");
  const text = ta.value;
  if (!text.trim()) return;
  if (!agentWs || agentWs.readyState !== WebSocket.OPEN) {
    toast("WebSocket 未连接", "err");
    return;
  }
  let frame;
  const trimmed = text.trim();
  if (trimmed.startsWith("{")) {
    try {
      frame = JSON.parse(trimmed);
      if (typeof frame !== "object" || frame === null) throw new Error("frame must be object");
    } catch (e) {
      toast("JSON 无效: " + e.message, "err");
      return;
    }
  } else {
    // 默认:封装为 prompt 帧
    frame = { type: "prompt", text: trimmed };
  }
  try {
    agentWs.send(JSON.stringify(frame));
    appendLine("in", JSON.stringify(frame));
    ta.value = "";
    ta.style.height = "auto";
  } catch (e) {
    appendLine("err", "send failed: " + e.message);
  }
}

// ═════════════════════════════════════════════════════════════════
// 入口
// ═════════════════════════════════════════════════════════════════

document.addEventListener("DOMContentLoaded", async () => {
  $("logout-btn").onclick = doLogout;
  if (!localStorage.getItem(TOKEN_KEY)) {
    clearSessionAndRedirect();
    return;
  }
  await refreshMe();
  loadAgentLines();        // 恢复 24h 内的会话历史
  await loadStatus();
});

// 跨 tab 同步:其他 tab 登出/登录 → 这里同步变化
window.addEventListener("storage", (ev) => {
  if (ev.key === TOKEN_KEY) {
    if (!ev.newValue) {
      // 其他 tab 已登出
      closeAgentWs();
      stopPoll();
      location.href = "/app.html";
    }
  }
});

window.addEventListener("beforeunload", () => {
  closeAgentWs();
  stopPoll();
  // 离开页面前 flush 一次,避免 debounce 丢最后 400ms
  if (_persistTimer) {
    clearTimeout(_persistTimer); _persistTimer = null;
    const key = agentLinesKey();
    if (!key) return;
    try {
      localStorage.setItem(key, JSON.stringify({
        saved_at: Date.now(), lines: agentLines,
      }));
    } catch { /* ignore */ }
  }
});
</script>
