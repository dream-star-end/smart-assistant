<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>OpenClaude · 超管控制台</title>
    <link rel="icon" href="/icon.svg" />
    <style>
      /* ======================================================================
       *  OpenClaude · Admin Console — modern dark UI
       *  设计语言: indigo/violet 渐变主色 + 多层柔阴影 + 圆角统一
       *  保留 admin.js 用到的所有 class 名:
       *    .panel .toolbar .btn .btn-primary .data .badge .empty .loading
       *    .error .modal .form-row .form-actions .toast .tabs .badge.ok
       *    .badge.warn .badge.danger .badge.muted .placeholder .login-gate
       * ====================================================================== */
      :root {
        color-scheme: dark;
        /* —— 表面层(从远到近)—— */
        --bg: #07090f;
        --bg-elev: #0c1018;
        --panel: #11151f;
        --panel-2: #161b28;
        --panel-hover: #1a2030;
        --border: #1f2533;
        --border-strong: #2a3142;
        /* —— 文字 —— */
        --text: #e7eaf2;
        --text-soft: #b9c0d0;
        --muted: #6b7388;
        /* —— 主色:indigo → violet —— */
        --accent: #818cf8;
        --accent-2: #6366f1;
        --accent-3: #8b5cf6;
        --accent-glow: rgba(99, 102, 241, 0.35);
        --accent-soft: rgba(99, 102, 241, 0.12);
        --grad-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        --grad-primary-hover: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
        /* —— 状态色 —— */
        --danger: #f87171;
        --danger-soft: rgba(248, 113, 113, 0.12);
        --warn: #fbbf24;
        --warn-soft: rgba(251, 191, 36, 0.12);
        --ok: #34d399;
        --ok-soft: rgba(52, 211, 153, 0.12);
        /* —— 阴影 —— */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.5);
        --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.55), 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 0 3px var(--accent-glow);
        /* —— 圆角 —— */
        --r-sm: 6px;
        --r-md: 10px;
        --r-lg: 14px;
        --r-xl: 18px;
        --r-pill: 999px;
        /* —— 缓动 —— */
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; min-height: 100%;
        background:
          radial-gradient(ellipse 1200px 600px at 20% -200px, rgba(99,102,241,0.10), transparent 60%),
          radial-gradient(ellipse 800px 400px at 100% 0%, rgba(139,92,246,0.06), transparent 70%),
          var(--bg);
        background-attachment: fixed;
        color: var(--text);
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
              "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      a { color: var(--accent); text-decoration: none; transition: color 0.15s var(--ease); }
      a:hover { color: var(--accent-3); text-decoration: none; }
      button, select, input, textarea {
        font: inherit; color: inherit;
      }
      ::selection { background: var(--accent-soft); color: var(--text); }

      /* 自定义滚动条 */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: var(--r-pill);
        border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: content-box;
        border: 2px solid transparent; }

      /* ── Header ───────────────────────────────────────────────── */
      header.app {
        display: flex; align-items: center; gap: 16px;
        padding: 14px 28px;
        background: rgba(11, 14, 22, 0.75);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0; z-index: 50;
      }
      header.app .brand {
        font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
        background: var(--grad-primary);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      header.app .brand small {
        color: var(--muted); font-weight: 500; margin-left: 10px;
        font-size: 12px;
        background: none; -webkit-text-fill-color: var(--muted);
      }
      header.app .spacer { flex: 1; }
      header.app .who {
        color: var(--text-soft); font-size: 13px;
        padding: 6px 12px; border-radius: var(--r-pill);
        background: var(--panel); border: 1px solid var(--border);
      }
      header.app .who strong { color: var(--text); font-weight: 600; }
      header.app .btn-logout {
        padding: 7px 14px; border: 1px solid var(--border);
        background: var(--panel); color: var(--text-soft);
        border-radius: var(--r-md); cursor: pointer;
        font-size: 13px; font-weight: 500;
        transition: all 0.18s var(--ease);
      }
      header.app .btn-logout:hover {
        background: var(--panel-hover); border-color: var(--accent-2);
        color: var(--text); transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
      }

      /* ── Tabs ─────────────────────────────────────────────────── */
      .tabs {
        display: flex; gap: 6px; padding: 14px 28px 0;
        max-width: 1480px; margin: 0 auto;
        overflow-x: auto;
      }
      .tabs::-webkit-scrollbar { height: 0; }
      .tabs button {
        padding: 9px 18px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        border-radius: var(--r-md);
        cursor: pointer; white-space: nowrap;
        font-size: 13px; font-weight: 500;
        transition: all 0.18s var(--ease);
        position: relative;
      }
      .tabs button:hover {
        color: var(--text-soft);
        background: var(--panel);
      }
      .tabs button.active {
        background: var(--panel);
        color: var(--text);
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.04);
      }
      .tabs button.active::after {
        content: "";
        position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%);
        width: 24px; height: 2px;
        background: var(--grad-primary);
        border-radius: var(--r-pill);
      }

      /* ── Main ────────────────────────────────────────────────── */
      main.content {
        padding: 24px 28px 64px;
        max-width: 1480px; margin: 0 auto;
      }

      /* ── Panel(卡片)───────────────────────────────────────── */
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 22px 24px;
        margin-bottom: 18px;
        box-shadow: var(--shadow-sm);
      }
      .panel h2 {
        margin: 0 0 16px; font-size: 17px; font-weight: 600;
        letter-spacing: -0.01em;
        display: flex; align-items: baseline; gap: 10px;
      }
      .panel h2 small {
        color: var(--muted); font-weight: 500;
        font-size: 12px;
        padding: 2px 10px; border-radius: var(--r-pill);
        background: var(--panel-2); border: 1px solid var(--border);
      }

      /* ── Toolbar ────────────────────────────────────────────── */
      .toolbar {
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .toolbar label {
        color: var(--muted); font-size: 13px;
        display: inline-flex; align-items: center; gap: 8px;
      }
      .toolbar input[type="text"],
      .toolbar select,
      .toolbar input[type="number"] {
        padding: 8px 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        border-radius: var(--r-md);
        color: var(--text);
        font-size: 13px;
        transition: all 0.18s var(--ease);
      }
      .toolbar input[type="text"] { min-width: 240px; }
      .toolbar input:focus, .toolbar select:focus {
        outline: none;
        border-color: var(--accent-2);
        box-shadow: var(--shadow-glow);
      }
      .toolbar .btn {
        padding: 8px 16px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-soft);
        border-radius: var(--r-md); cursor: pointer;
        font-size: 13px; font-weight: 500;
        transition: all 0.18s var(--ease);
      }
      .toolbar .btn:hover {
        background: var(--panel-hover);
        border-color: var(--border-strong);
        color: var(--text);
        transform: translateY(-1px);
      }
      .toolbar .btn-primary {
        background: var(--grad-primary);
        color: white;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      }
      .toolbar .btn-primary:hover {
        background: var(--grad-primary-hover);
        box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        transform: translateY(-1px);
      }
      .toolbar .spacer { flex: 1; }

      /* ── Table ────────────────────────────────────────────── */
      table.data {
        width: 100%; border-collapse: collapse;
        font-size: 13px;
      }
      table.data th, table.data td {
        padding: 12px 14px; text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      table.data th {
        font-weight: 600; color: var(--muted);
        background: transparent;
        text-transform: uppercase;
        font-size: 11px; letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-strong);
        position: sticky; top: 0; z-index: 1;
      }
      table.data tbody tr {
        transition: background 0.15s var(--ease);
      }
      table.data tbody tr:hover td { background: rgba(99,102,241,0.06); }
      table.data tbody tr:last-child td { border-bottom: none; }
      table.data td.num {
        text-align: right; font-variant-numeric: tabular-nums;
        font-weight: 500;
      }
      table.data td.mono {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px; color: var(--text-soft);
      }
      table.data td.actions {
        white-space: nowrap; text-align: right;
      }
      table.data td.actions button {
        padding: 5px 12px; margin-left: 6px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-soft);
        border-radius: var(--r-sm); cursor: pointer;
        font-size: 12px; font-weight: 500;
        transition: all 0.15s var(--ease);
      }
      table.data td.actions button:hover {
        border-color: var(--accent-2);
        color: var(--accent);
        background: var(--accent-soft);
        transform: translateY(-1px);
      }

      /* ── Badge ────────────────────────────────────────────── */
      .badge {
        display: inline-flex; align-items: center;
        padding: 3px 10px; border-radius: var(--r-pill);
        font-size: 11px; font-weight: 600; line-height: 1.4;
        border: 1px solid var(--border-strong);
        background: var(--panel-2);
        color: var(--text-soft);
        letter-spacing: 0.02em;
      }
      .badge.ok {
        color: var(--ok); border-color: rgba(52,211,153,0.4);
        background: var(--ok-soft);
      }
      .badge.warn {
        color: var(--warn); border-color: rgba(251,191,36,0.4);
        background: var(--warn-soft);
      }
      .badge.danger {
        color: var(--danger); border-color: rgba(248,113,113,0.4);
        background: var(--danger-soft);
      }
      .badge.muted {
        color: var(--muted);
      }

      /* ── State blocks ─────────────────────────────────────── */
      .empty, .loading {
        color: var(--muted);
        padding: 48px 24px; text-align: center;
        font-size: 14px;
      }
      .loading::before {
        content: ""; display: inline-block;
        width: 14px; height: 14px; margin-right: 10px; vertical-align: -2px;
        border: 2px solid var(--border-strong);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .empty::before { content: "—"; display: block; font-size: 28px; opacity: 0.3; margin-bottom: 8px; }
      .error {
        color: var(--danger);
        padding: 14px 18px;
        background: var(--danger-soft);
        border: 1px solid rgba(248,113,113,0.4);
        border-radius: var(--r-md);
        margin-bottom: 16px;
        font-size: 13px;
      }
      .placeholder {
        background: var(--panel-2);
        border: 1px dashed var(--border-strong);
        padding: 48px 32px; border-radius: var(--r-lg);
        text-align: center; color: var(--muted);
        font-size: 14px;
      }

      /* ── Pagination ───────────────────────────────────────── */
      .pagination {
        display: flex; gap: 8px; align-items: center;
        margin-top: 16px;
        color: var(--muted); font-size: 13px;
      }
      .pagination button {
        padding: 6px 14px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-soft);
        border-radius: var(--r-sm); cursor: pointer;
        font-size: 13px; font-weight: 500;
        transition: all 0.15s var(--ease);
      }
      .pagination button:hover:not(:disabled) {
        border-color: var(--accent-2); color: var(--accent);
        background: var(--accent-soft);
      }
      .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }

      /* ── Toast ──────────────────────────────────────────── */
      .toast-wrap {
        position: fixed; right: 24px; top: 80px;
        display: flex; flex-direction: column; gap: 10px;
        z-index: 100; pointer-events: none;
      }
      .toast {
        padding: 12px 18px; border-radius: var(--r-md);
        background: var(--panel);
        border: 1px solid var(--border-strong);
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        pointer-events: auto;
        font-size: 13px; font-weight: 500;
        max-width: 380px;
        animation: toastIn 0.25s var(--ease);
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(-8px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .toast.ok { border-color: rgba(52,211,153,0.5); color: var(--ok);
        background: linear-gradient(180deg, var(--ok-soft), var(--panel)); }
      .toast.danger { border-color: rgba(248,113,113,0.5); color: var(--danger);
        background: linear-gradient(180deg, var(--danger-soft), var(--panel)); }

      /* ── Modal ──────────────────────────────────────────── */
      .modal-bg {
        position: fixed; inset: 0;
        background: rgba(5, 7, 12, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center;
        z-index: 90;
        animation: bgIn 0.2s var(--ease);
      }
      .modal-bg[hidden] { display: none; }
      @keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }
      .modal {
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-xl);
        padding: 28px;
        min-width: 420px;
        max-width: 620px;
        width: 100%;
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        animation: modalIn 0.22s var(--ease);
      }
      @keyframes modalIn {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .modal h3 {
        margin: 0 0 18px; font-size: 17px; font-weight: 600;
        letter-spacing: -0.01em;
      }
      .modal .form-row {
        display: flex; flex-direction: column; gap: 6px;
        margin-bottom: 14px;
      }
      .modal .form-row label {
        color: var(--text-soft); font-size: 12px; font-weight: 500;
        letter-spacing: 0.01em;
      }
      .modal .form-row input,
      .modal .form-row select,
      .modal .form-row textarea {
        padding: 9px 12px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--text);
        border-radius: var(--r-md);
        font-size: 13px;
        transition: all 0.18s var(--ease);
      }
      .modal .form-row input:focus,
      .modal .form-row select:focus,
      .modal .form-row textarea:focus {
        outline: none;
        border-color: var(--accent-2);
        box-shadow: var(--shadow-glow);
      }
      .modal .form-row input::placeholder,
      .modal .form-row textarea::placeholder {
        color: var(--muted); opacity: 0.7;
      }
      .modal .form-row textarea {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; min-height: 90px; resize: vertical;
      }
      .modal .form-row small {
        color: var(--muted); font-size: 11px;
      }
      .modal .form-actions {
        display: flex; gap: 10px; justify-content: flex-end;
        margin-top: 22px; padding-top: 18px;
        border-top: 1px solid var(--border);
      }
      .modal .form-actions button {
        padding: 9px 18px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-soft);
        border-radius: var(--r-md); cursor: pointer;
        font-size: 13px; font-weight: 500;
        transition: all 0.18s var(--ease);
      }
      .modal .form-actions button:hover {
        background: var(--panel-hover);
        color: var(--text);
        border-color: var(--border-strong);
      }
      .modal .form-actions .btn-primary {
        background: var(--grad-primary);
        color: white;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      }
      .modal .form-actions .btn-primary:hover {
        background: var(--grad-primary-hover);
        box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        color: white;
      }
      .modal .form-actions .btn-primary:disabled {
        opacity: 0.5; cursor: not-allowed;
      }

      /* OAuth box(在 modal 内 — admin.js 用 inline style,这里覆盖更现代) */
      .modal .oauth-box {
        background: linear-gradient(135deg, rgba(99,102,241,0.10), rgba(139,92,246,0.06)) !important;
        border: 1px solid rgba(99,102,241,0.35) !important;
        border-radius: var(--r-lg) !important;
        box-shadow: 0 0 0 1px rgba(99,102,241,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
      }
      .modal .oauth-box button.btn-primary {
        background: var(--grad-primary);
        color: white; border: none;
        padding: 8px 14px; border-radius: var(--r-md);
        font-size: 13px; font-weight: 600; cursor: pointer;
        transition: all 0.18s var(--ease);
        box-shadow: 0 2px 8px rgba(99,102,241,0.3);
      }
      .modal .oauth-box button.btn-primary:hover:not(:disabled) {
        background: var(--grad-primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(99,102,241,0.4);
      }
      .modal .oauth-box button.btn-primary:disabled {
        opacity: 0.5; cursor: not-allowed;
      }
      .modal .oauth-box input[type="text"] {
        padding: 8px 12px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--r-md);
        font-size: 13px;
        transition: all 0.18s var(--ease);
      }
      .modal .oauth-box input[type="text"]:focus {
        outline: none; border-color: var(--accent-2);
        box-shadow: var(--shadow-glow);
      }
      .modal hr {
        border: 0;
        border-top: 1px solid var(--border) !important;
        margin: 18px 0 !important;
      }

      /* ── Login gate ─────────────────────────────────────── */
      .login-gate {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh; gap: 16px;
        text-align: center;
      }
      .login-gate .icon { font-size: 56px; opacity: 0.7; }
      .login-gate a {
        padding: 11px 28px;
        background: var(--grad-primary);
        border-radius: var(--r-md);
        color: white; font-weight: 600; font-size: 14px;
        box-shadow: 0 4px 16px rgba(99,102,241,0.4);
        transition: all 0.2s var(--ease);
      }
      .login-gate a:hover {
        background: var(--grad-primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99,102,241,0.5);
      }

      /* ── Form rows that escape modal(direct .form-row outside .modal — 罕见)── */
      .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
      .form-row label { color: var(--text-soft); font-size: 12px; font-weight: 500; }
      .form-row input, .form-row select, .form-row textarea {
        padding: 9px 12px; border: 1px solid var(--border);
        background: var(--bg-elev); color: var(--text);
        border-radius: var(--r-md); font-size: 13px;
        transition: all 0.18s var(--ease);
      }
      .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
        outline: none; border-color: var(--accent-2); box-shadow: var(--shadow-glow);
      }
      .form-row textarea {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; min-height: 90px; resize: vertical;
      }

      /* ── Health tab cards(.h-card / .h-grid 等若 admin.js 用)── */
      .h-grid {
        display: grid; gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .h-card {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        padding: 16px;
      }
      .h-card .label { color: var(--muted); font-size: 12px; }
      .h-card .value { font-size: 22px; font-weight: 600; margin-top: 4px;
        font-variant-numeric: tabular-nums; }

      /* ── Mobile / narrow ──────────────────────────────── */
