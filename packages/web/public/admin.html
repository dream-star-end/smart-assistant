<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#1a1a1d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf9f6" media="(prefers-color-scheme: light)" />
    <title>OpenClaude · 超管控制台</title>
    <link rel="icon" href="/icon.svg" />
    <style>
      /* ══════════════════════════════════════════════════════════════════
       *  OpenClaude · Admin Console
       *  设计语言: warm terracotta accent (#d97757) + cream/ink neutrals
       *  来源: ui_kits/openclaude-web 设计包 (2026-04-22 重构)
       *
       *  保留 admin.js 依赖的所有 class 名:
       *    .panel .toolbar .btn .btn-primary .data .badge .empty .loading
       *    .error .modal .modal-bg .form-row .form-actions .toast
       *    .toast-wrap .tabs .placeholder .login-gate .h-grid .h-card
       *    .badge.ok .badge.warn .badge.danger .badge.muted
       * ══════════════════════════════════════════════════════════════════ */

      :root {
        /* ── Typography ── */
        --font-sans: -apple-system, BlinkMacSystemFont, "Inter",
          "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo,
          Monaco, Consolas, monospace;
        --font-serif: "Source Serif Pro", "Noto Serif SC", ui-serif, Georgia, serif;

        /* ── Radii ── */
        --r-sm: 6px;
        --r-md: 10px;
        --r-lg: 14px;
        --r-xl: 18px;
        --r-pill: 9999px;

        /* ── Spacing (4px baseline) ── */
        --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
        --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;

        /* ── Motion ── */
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --t-fast: 120ms var(--ease);
        --t-base: 180ms var(--ease);
        --t-slow: 280ms var(--ease);
      }

      /* ── Dark theme (default) — warm, not pure black ── */
      :root, :root[data-theme="dark"] {
        color-scheme: dark;

        --bg: #1a1a1d;
        --bg-elev: #212125;
        --panel: #212125;
        --panel-2: #2a2a30;
        --panel-hover: #31313a;
        --bg-subtle: #1e1e22;

        --border: #32323a;
        --border-strong: #42424c;
        --border-subtle: #26262c;

        --text: #eceae6;
        --text-strong: #faf9f6;
        --text-soft: #c5c2bc;
        --muted: #9f9c96;
        --dim: #6a6862;

        --accent: #d97757;
        --accent-hover: #e48968;
        --accent-active: #c56a4a;
        --accent-soft: rgba(217, 119, 87, 0.14);
        --accent-border: rgba(217, 119, 87, 0.30);
        --accent-fg: #ffffff;
        --accent-glow: rgba(217, 119, 87, 0.25);

        --grad-primary: linear-gradient(135deg, #d97757 0%, #c56a4a 100%);
        --grad-primary-hover: linear-gradient(135deg, #e48968 0%, #d97757 100%);

        --ok: #86c781;
        --ok-soft: rgba(134, 199, 129, 0.12);
        --warn: #e8b64c;
        --warn-soft: rgba(232, 182, 76, 0.12);
        --danger: #e06c6c;
        --danger-soft: rgba(224, 108, 108, 0.12);
        --info: #7aafe6;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.20);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.30);
        --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.45);
        --shadow-xl: 0 24px 96px rgba(0, 0, 0, 0.60);
        --ring: 0 0 0 3px var(--accent-glow);

        --glass-bg: rgba(26, 26, 29, 0.78);
        --code-bg: #141418;
        --inline-code-bg: rgba(155, 150, 140, 0.18);
      }

      /* ── Light theme (cream) ── */
      :root[data-theme="light"] {
        color-scheme: light;

        --bg: #faf9f6;
        --bg-elev: #ffffff;
        --panel: #ffffff;
        --panel-2: #f3f2ed;
        --panel-hover: #ebeae3;
        --bg-subtle: #f6f5f1;

        --border: #e3e1d9;
        --border-strong: #cfccc2;
        --border-subtle: #ecebe4;

        --text: #1a1a1d;
        --text-strong: #000000;
        --text-soft: #3a3832;
        --muted: #6a6862;
        --dim: #9f9c96;

        --accent: #bc4f22;
        --accent-hover: #a84418;
        --accent-active: #8f390f;
        --accent-soft: rgba(188, 79, 34, 0.08);
        --accent-border: rgba(188, 79, 34, 0.22);
        --accent-fg: #ffffff;
        --accent-glow: rgba(188, 79, 34, 0.22);

        --grad-primary: linear-gradient(135deg, #bc4f22 0%, #8f390f 100%);
        --grad-primary-hover: linear-gradient(135deg, #d55c2a 0%, #bc4f22 100%);

        --ok: #3f9f4a;
        --ok-soft: rgba(63, 159, 74, 0.10);
        --warn: #b8820a;
        --warn-soft: rgba(184, 130, 10, 0.10);
        --danger: #c4393d;
        --danger-soft: rgba(196, 57, 61, 0.10);
        --info: #2a6ec2;

        --shadow-sm: 0 1px 2px rgba(30, 25, 10, 0.06);
        --shadow-md: 0 4px 16px rgba(30, 25, 10, 0.08);
        --shadow-lg: 0 12px 48px rgba(30, 25, 10, 0.14);
        --shadow-xl: 0 24px 96px rgba(30, 25, 10, 0.20);
        --ring: 0 0 0 3px var(--accent-glow);

        --glass-bg: rgba(250, 249, 246, 0.85);
        --code-bg: #f3f2ec;
        --inline-code-bg: rgba(60, 58, 50, 0.08);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.55 var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      body {
        background:
          radial-gradient(ellipse 1000px 500px at 20% -100px, var(--accent-soft), transparent 60%),
          var(--bg);
        background-attachment: fixed;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      a { color: var(--accent); text-decoration: none; transition: color var(--t-fast); }
      a:hover { color: var(--accent-hover); }
      button, select, input, textarea { font: inherit; color: inherit; }
      ::selection { background: var(--accent-soft); color: var(--text-strong); }

      code { font-family: var(--font-mono); font-size: 0.9em;
        background: var(--inline-code-bg); padding: 2px 6px; border-radius: var(--r-sm); }

      /* Scrollbar — thin, accent-tinted on hover */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: var(--r-pill);
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
        background-clip: content-box;
        border: 2px solid transparent;
      }

      /* ══════════ Header ══════════ */
      header.app {
        display: flex;
        align-items: center;
        gap: var(--s-4);
        padding: var(--s-3) var(--s-6);
        padding-left: max(var(--s-6), env(safe-area-inset-left, 0));
        padding-right: max(var(--s-6), env(safe-area-inset-right, 0));
        padding-top: calc(var(--s-3) + env(safe-area-inset-top, 0));
        background: var(--glass-bg);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 50;
        min-height: 56px;
      }
      header.app .brand {
        display: inline-flex;
        align-items: center;
        gap: var(--s-3);
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.01em;
        color: var(--text-strong);
      }
      header.app .brand-mark {
        width: 30px; height: 30px;
        border-radius: var(--r-md);
        background: #0d1117;
        border: 1px solid var(--border);
        display: inline-flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      header.app .brand-mark img { width: 22px; height: 22px; display: block; }
      header.app .brand small {
        color: var(--muted);
        font-weight: 500;
        margin-left: 4px;
        font-size: 12px;
        font-family: var(--font-mono);
      }
      header.app .spacer { flex: 1; }
      header.app .who {
        color: var(--text-soft);
        font-size: 13px;
        padding: 6px 14px;
        border-radius: var(--r-pill);
        background: var(--panel-2);
        border: 1px solid var(--border);
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      header.app .who strong { color: var(--text-strong); font-weight: 600; }
      header.app .btn-logout {
        padding: 7px 14px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text-soft);
        border-radius: var(--r-md);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        transition: all var(--t-fast);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 36px;
      }
      header.app .btn-logout:hover {
        background: var(--panel-hover);
        border-color: var(--border-strong);
        color: var(--text);
      }
      header.app .btn-logout:active { transform: scale(0.97); }
      header.app .theme-toggle {
        display: inline-flex; align-items: center; justify-content: center;
        width: 36px; height: 36px;
        border-radius: var(--r-md);
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--muted);
        cursor: pointer;
        transition: all var(--t-fast);
      }
      header.app .theme-toggle:hover { color: var(--text); background: var(--panel-hover); }
      header.app .theme-toggle svg { width: 16px; height: 16px; }

      /* ══════════ Tabs ══════════ */
      .tabs {
        display: flex;
        gap: 2px;
        padding: var(--s-3) var(--s-6) 0;
        padding-left: max(var(--s-6), env(safe-area-inset-left, 0));
        padding-right: max(var(--s-6), env(safe-area-inset-right, 0));
        max-width: 1280px;
        margin: 0 auto;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar { height: 0; }
      .tabs button {
        padding: 9px 16px;
        border: 0;
        background: transparent;
        color: var(--muted);
        border-radius: var(--r-sm);
        cursor: pointer;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: background var(--t-fast), color var(--t-fast);
        min-height: 36px;
      }
      .tabs button:hover { background: var(--panel-2); color: var(--text); }
      .tabs button.active {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .tabs button:active:not(.active) { transform: scale(0.98); }

      /* ══════════ Main ══════════ */
      main.content {
        padding: var(--s-6) var(--s-6) 80px;
        padding-left: max(var(--s-6), env(safe-area-inset-left, 0));
        padding-right: max(var(--s-6), env(safe-area-inset-right, 0));
        max-width: 1280px;
        margin: 0 auto;
      }
      /* smooth tab/content swap */
      main.content > * { animation: fade-up var(--t-slow) both; }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ══════════ Panel (card) ══════════ */
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: var(--s-5) var(--s-6);
        margin-bottom: var(--s-4);
        box-shadow: var(--shadow-sm);
      }
      .panel h2 {
        margin: 0 0 var(--s-4);
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text-strong);
        display: flex;
        align-items: baseline;
        gap: var(--s-3);
        flex-wrap: wrap;
      }
      .panel h2 small {
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
        padding: 2px 10px;
        border-radius: var(--r-pill);
        background: var(--bg-subtle);
        border: 1px solid var(--border-subtle);
      }

      /* ══════════ Toolbar ══════════ */
      .toolbar {
        display: flex;
        gap: var(--s-3);
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: var(--s-4);
      }
      .toolbar label {
        color: var(--muted);
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: var(--s-2);
      }
      .toolbar input[type="text"],
      .toolbar select,
      .toolbar input[type="number"] {
        padding: 9px 13px;
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        border-radius: var(--r-md);
        color: var(--text);
        font-size: 13px;
        transition: border-color var(--t-fast), box-shadow var(--t-fast);
        min-height: 38px;
      }
      .toolbar input[type="text"] { min-width: 220px; flex: 1 1 220px; max-width: 360px; }
      .toolbar input:focus, .toolbar select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      .toolbar .spacer { flex: 1; }

      /* ══════════ Button base (.btn / .btn-primary) ══════════ */
      .btn {
        padding: 8px 16px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        border-radius: var(--r-md);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: background var(--t-fast), border-color var(--t-fast),
                    color var(--t-fast), transform var(--t-fast);
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        white-space: nowrap;
      }
      .btn:hover:not(:disabled) {
        background: var(--panel-hover);
        border-color: var(--border-strong);
      }
      .btn:active:not(:disabled) { transform: scale(0.98); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-primary {
        background: var(--grad-primary);
        color: #fff;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 4px 14px rgba(217, 119, 87, 0.24);
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--grad-primary-hover);
        box-shadow: 0 6px 20px rgba(217, 119, 87, 0.32);
      }
      .btn-primary:active:not(:disabled) { transform: scale(0.98); }
      [data-theme="light"] .btn-primary {
        box-shadow: 0 4px 12px rgba(188, 79, 34, 0.22);
      }

      /* Button loading state (added by admin.js via .is-loading class) */
      .btn.is-loading {
        color: transparent !important;
        pointer-events: none;
        position: relative;
      }
      .btn.is-loading::after {
        content: "";
        position: absolute;
        inset: 0;
        margin: auto;
        width: 14px; height: 14px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        color: inherit;
        animation: spin 0.8s linear infinite;
      }
      .btn-primary.is-loading::after {
        border-color: rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ══════════ Data Table ══════════ */
      .table-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 0 calc(var(--s-6) * -1);
      }
      table.data {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      table.data th, table.data td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
        vertical-align: middle;
      }
      table.data th {
        font-weight: 600;
        color: var(--dim);
        background: var(--bg-subtle);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.06em;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      table.data tbody tr {
        transition: background var(--t-fast);
      }
      table.data tbody tr:hover td { background: var(--panel-2); }
      table.data tbody tr:last-child td { border-bottom: none; }
      table.data td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-weight: 500;
        font-family: var(--font-mono);
      }
      table.data td.mono {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-soft);
      }
      table.data td.actions { white-space: nowrap; text-align: right; }
      table.data td.actions button {
        padding: 5px 12px;
        margin-left: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-soft);
        border-radius: var(--r-sm);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        transition: all var(--t-fast);
        min-height: 28px;
      }
      table.data td.actions button:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }

      /* ══════════ Badge ══════════ */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: var(--r-pill);
        font-size: 11px;
        font-weight: 600;
        line-height: 1.4;
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        color: var(--text-soft);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .badge.ok {
        color: var(--ok);
        border-color: rgba(134, 199, 129, 0.35);
        background: var(--ok-soft);
      }
      .badge.warn {
        color: var(--warn);
        border-color: rgba(232, 182, 76, 0.35);
        background: var(--warn-soft);
      }
      .badge.danger {
        color: var(--danger);
        border-color: rgba(224, 108, 108, 0.35);
        background: var(--danger-soft);
      }
      .badge.muted { color: var(--muted); }

      /* ══════════ State blocks ══════════ */
      .empty, .loading {
        color: var(--muted);
        padding: 48px 24px;
        text-align: center;
        font-size: 14px;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .loading::before {
        content: "";
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--border-strong);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .empty::before {
        content: "—";
        display: block;
        font-size: 28px;
        opacity: 0.3;
        margin-bottom: 8px;
      }

      /* Skeleton shimmer loader (opt-in via <div class="skeleton">) */
      .skeleton {
        display: flex;
        flex-direction: column;
        gap: var(--s-4);
        padding: var(--s-3) 0;
      }
      .skeleton-row {
        display: flex;
        flex-direction: column;
        gap: var(--s-3);
        padding: var(--s-3) 0;
        border-bottom: 1px solid var(--border-subtle);
      }
      .skeleton-row:last-child { border-bottom: 0; }
      .skeleton-bar {
        height: 14px;
        border-radius: var(--r-sm);
        background: linear-gradient(90deg,
          var(--panel-2) 0%,
          var(--panel-hover) 50%,
          var(--panel-2) 100%);
        background-size: 200% 100%;
        animation: shimmer 1.6s linear infinite;
      }
      .skeleton-bar.w60 { width: 60%; }
      .skeleton-bar.w80 { width: 80%; }
      .skeleton-bar.w40 { width: 40%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton-bar { animation: none; }
      }

      .error {
        color: var(--danger);
        padding: 14px 18px;
        background: var(--danger-soft);
        border: 1px solid rgba(224, 108, 108, 0.35);
        border-radius: var(--r-md);
        margin-bottom: 16px;
        font-size: 13px;
      }
      .placeholder {
        background: var(--bg-subtle);
        border: 1px dashed var(--border-strong);
        padding: 48px 32px;
        border-radius: var(--r-lg);
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      /* ══════════ Pagination ══════════ */
      .pagination {
        display: flex;
        gap: var(--s-2);
        align-items: center;
        margin-top: var(--s-4);
        color: var(--muted);
        font-size: 13px;
        flex-wrap: wrap;
      }
      .pagination button {
        padding: 6px 14px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text-soft);
        border-radius: var(--r-sm);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        transition: all var(--t-fast);
        min-height: 30px;
      }
      .pagination button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }
      .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }

      /* ══════════ Toast ══════════ */
      .toast-wrap {
        position: fixed;
        right: var(--s-6);
        top: calc(72px + env(safe-area-inset-top, 0));
        display: flex;
        flex-direction: column;
        gap: var(--s-2);
        z-index: 100;
        pointer-events: none;
      }
      .toast {
        padding: 12px 18px;
        border-radius: var(--r-md);
        background: var(--panel);
        border: 1px solid var(--border-strong);
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        pointer-events: auto;
        font-size: 13px;
        font-weight: 500;
        max-width: 380px;
        animation: toastIn 0.25s var(--ease);
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(-8px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .toast.ok {
        border-color: rgba(134, 199, 129, 0.5);
        color: var(--ok);
        background: linear-gradient(180deg, var(--ok-soft), var(--panel));
      }
      .toast.danger {
        border-color: rgba(224, 108, 108, 0.5);
        color: var(--danger);
        background: linear-gradient(180deg, var(--danger-soft), var(--panel));
      }

      /* ══════════ Modal ══════════ */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 90;
        animation: bgIn 0.2s var(--ease);
        padding: var(--s-4);
      }
      [data-theme="light"] .modal-bg { background: rgba(30, 25, 10, 0.35); }
      .modal-bg[hidden] { display: none; }
      @keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--r-xl);
        padding: var(--s-6) var(--s-6);
        min-width: min(420px, 94vw);
        max-width: 620px;
        width: 100%;
        max-height: calc(100dvh - 40px);
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        animation: modalIn 0.22s var(--ease);
      }
      @keyframes modalIn {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .modal h3 {
        margin: 0 0 var(--s-4);
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text-strong);
      }
      .modal .form-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: var(--s-4);
      }
      .modal .form-row label {
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .modal .form-row input,
      .modal .form-row select,
      .modal .form-row textarea {
        padding: 10px 13px;
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        color: var(--text);
        border-radius: var(--r-md);
        font-size: 14px;
        transition: border-color var(--t-fast), box-shadow var(--t-fast);
        min-height: 40px;
      }
      .modal .form-row input:focus,
      .modal .form-row select:focus,
      .modal .form-row textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      .modal .form-row input::placeholder,
      .modal .form-row textarea::placeholder {
        color: var(--dim);
        opacity: 0.8;
      }
      .modal .form-row textarea {
        font-family: var(--font-mono);
        font-size: 12.5px;
        min-height: 90px;
        resize: vertical;
      }
      .modal .form-row small {
        color: var(--muted);
        font-size: 11px;
      }
      .modal .form-row .hint {
        color: var(--muted);
        font-size: 11.5px;
        font-family: var(--font-mono);
      }
      .modal .form-actions {
        display: flex;
        gap: var(--s-2);
        justify-content: flex-end;
        margin-top: var(--s-5);
        padding-top: var(--s-4);
        border-top: 1px solid var(--border-subtle);
        flex-wrap: wrap;
      }
      .modal .form-actions button {
        padding: 9px 18px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        border-radius: var(--r-md);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: all var(--t-fast);
        min-height: 38px;
      }
      .modal .form-actions button:hover:not(:disabled) {
        background: var(--panel-hover);
        color: var(--text-strong);
        border-color: var(--border-strong);
      }
      .modal .form-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
      .modal .form-actions .btn-primary {
        background: var(--grad-primary);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(217, 119, 87, 0.24);
      }
      .modal .form-actions .btn-primary:hover:not(:disabled) {
        background: var(--grad-primary-hover);
        box-shadow: 0 6px 18px rgba(217, 119, 87, 0.32);
        color: #fff;
      }

      /* OAuth box — inline styled in admin.js; override to match warm theme */
      .modal .oauth-box {
        background: var(--accent-soft) !important;
        border: 1px solid var(--accent-border) !important;
        border-radius: var(--r-lg) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .modal .oauth-box button.btn-primary {
        background: var(--grad-primary);
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: var(--r-md);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--t-fast);
        box-shadow: 0 2px 8px rgba(217, 119, 87, 0.24);
      }
      .modal .oauth-box button.btn-primary:hover:not(:disabled) {
        background: var(--grad-primary-hover);
        box-shadow: 0 4px 14px rgba(217, 119, 87, 0.32);
      }
      .modal .oauth-box button.btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .modal .oauth-box input[type="text"] {
        padding: 8px 12px;
        background: var(--bg-subtle);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--r-md);
        font-size: 13px;
        transition: all var(--t-fast);
      }
      .modal .oauth-box input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      .modal hr {
        border: 0;
        border-top: 1px solid var(--border) !important;
        margin: var(--s-5) 0 !important;
      }

      /* ══════════ Login gate ══════════ */
      .login-gate {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        gap: var(--s-4);
        text-align: center;
        padding: var(--s-6);
      }
      .login-gate .icon {
        font-size: 56px;
        opacity: 0.7;
        margin-bottom: var(--s-2);
      }
      .login-gate a {
        padding: 11px 28px;
        background: var(--grad-primary);
        border-radius: var(--r-md);
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 4px 16px rgba(217, 119, 87, 0.32);
        transition: all var(--t-base);
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
      .login-gate a:hover {
        background: var(--grad-primary-hover);
        box-shadow: 0 6px 20px rgba(217, 119, 87, 0.4);
        color: #fff;
      }

      /* ══════════ Direct form-row (outside modal; rare) ══════════ */
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: var(--s-4);
      }
      .form-row label {
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 600;
      }
      .form-row input,
      .form-row select,
      .form-row textarea {
        padding: 10px 13px;
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        color: var(--text);
        border-radius: var(--r-md);
        font-size: 13px;
        transition: all var(--t-fast);
        min-height: 40px;
      }
      .form-row input:focus,
      .form-row select:focus,
      .form-row textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      .form-row textarea {
        font-family: var(--font-mono);
        font-size: 12.5px;
        min-height: 90px;
        resize: vertical;
      }

      /* ══════════ Health tab cards ══════════ */
      .h-grid {
        display: grid;
        gap: var(--s-3);
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }
      .h-card {
        background: var(--bg-subtle);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        padding: var(--s-4);
        transition: border-color var(--t-base), box-shadow var(--t-base);
      }
      .h-card:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-sm);
      }
      .h-card .label {
        color: var(--dim);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .h-card .value {
        font-size: 24px;
        font-weight: 700;
        margin-top: 6px;
        color: var(--text-strong);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      /* ══════════ Mobile (≤860px) ══════════ */
      @media (max-width: 860px) {
        header.app {
          gap: var(--s-2);
          padding-left: max(var(--s-4), env(safe-area-inset-left, 0));
          padding-right: max(var(--s-4), env(safe-area-inset-right, 0));
        }
        header.app .brand small { display: none; }
        header.app .who {
          font-size: 12px;
          padding: 5px 10px;
          max-width: 120px;
        }
        .tabs {
          padding: var(--s-3) var(--s-3) 0;
        }
        .tabs button {
          padding: 7px 12px;
          font-size: 12px;
        }
        main.content {
          padding: var(--s-4);
          padding-left: max(var(--s-4), env(safe-area-inset-left, 0));
          padding-right: max(var(--s-4), env(safe-area-inset-right, 0));
        }
        .panel {
          padding: var(--s-4);
          border-radius: var(--r-md);
        }
        .panel h2 { font-size: 15px; }
        .toolbar input[type="text"] { min-width: 100%; max-width: 100%; flex: 1 1 100%; }

        /* Tables → horizontal scroll containers */
        table.data {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          white-space: nowrap;
        }
        table.data thead, table.data tbody { display: table; width: auto; min-width: 100%; }
        table.data th, table.data td {
          padding: 10px 12px;
          font-size: 12px;
        }
        table.data td.actions button {
          padding: 8px 12px;
          font-size: 12px;
          margin-left: 4px;
          min-height: 36px;
        }

        .modal {
          min-width: 0;
          max-width: calc(100vw - 24px);
          padding: var(--s-5) var(--s-4);
        }
        .toast-wrap {
          right: var(--s-3);
          left: var(--s-3);
          top: calc(64px + env(safe-area-inset-top, 0));
        }
        .toast { max-width: 100%; }
      }

      @media (max-width: 480px) {
        .btn, .toolbar .btn { padding: 10px 14px; font-size: 13px; min-height: 44px; }
        header.app .btn-logout { padding: 8px 12px; font-size: 12px; min-height: 36px; }
        header.app .theme-toggle { width: 38px; height: 38px; }
        /* 触摸目标友好:header 元素保持够大 */
        h2 { font-size: 16px; }
        .form-actions { flex-direction: column-reverse; gap: var(--s-2); }
        .form-actions .btn { width: 100%; }
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="app">
      <span class="brand">
        <span class="brand-mark"><img src="/icon.svg" alt="OpenClaude" /></span>
        OpenClaude<small>/ admin</small>
      </span>
      <span class="spacer"></span>
      <span class="who" id="who">—</span>
      <button class="theme-toggle" id="theme-toggle" title="切换主题" aria-label="切换主题">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <a href="/" class="btn-logout" id="back-to-app" title="返回用户端">返回应用</a>
      <button class="btn-logout" id="logout">退出</button>
    </header>
    <nav class="tabs" id="tabs" role="tablist">
      <button data-tab="users" class="active">用户</button>
      <button data-tab="accounts">账号池</button>
      <button data-tab="containers">容器</button>
      <button data-tab="ledger">积分流水</button>
      <button data-tab="pricing">定价</button>
      <button data-tab="plans">充值套餐</button>
      <button data-tab="settings">系统设置</button>
      <button data-tab="audit">审计日志</button>
      <button data-tab="health">健康面板</button>
    </nav>
    <main class="content" id="view">
      <div class="loading">加载中…</div>
    </main>
    <div class="toast-wrap" id="toasts"></div>
    <div class="modal-bg" id="modal-bg" hidden>
      <div class="modal" id="modal-body"></div>
    </div>
    <script>
      // Theme bootstrap: pre-paint from localStorage so dark/light flashes correctly
      (function () {
        try {
          var t = localStorage.getItem('oc_theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch {}
        function updateIcon() {
          var dark = document.documentElement.getAttribute('data-theme') !== 'light';
          var icon = document.getElementById('theme-icon');
          if (!icon) return;
          icon.innerHTML = dark
            ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
        window.addEventListener('DOMContentLoaded', function () {
          updateIcon();
          var btn = document.getElementById('theme-toggle');
          if (btn) btn.addEventListener('click', function () {
            var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
            var next = cur === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('oc_theme', next); } catch {}
            updateIcon();
          });
        });
      })();
    </script>
    <script type="module" src="/modules/admin.js?v=ds1-a"></script>
  </body>
</html>
