<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="label">Buttons</div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
  <button style="background:#d97757;color:#fff;border:none;padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;font-family:inherit;cursor:pointer">发送 →</button>
  <button style="background:#2a2a30;color:#eceae6;border:1px solid #32323a;padding:8px 16px;border-radius:10px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">取消</button>
  <button style="background:transparent;color:#eceae6;border:1px solid #32323a;padding:8px 16px;border-radius:10px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">次级</button>
  <button style="background:transparent;color:#d97757;border:none;padding:8px 12px;border-radius:10px;font-weight:500;font-size:13px;font-family:inherit;cursor:pointer">ghost</button>
  <button disabled style="background:#d97757;opacity:.4;color:#fff;border:none;padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;font-family:inherit">disabled</button>
</div>
<div class="label" style="margin-top:14px">Icon buttons</div>
<div style="display:flex;gap:6px">
  <button style="width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid #32323a;color:#eceae6;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
  <button style="width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid #32323a;color:#eceae6;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  <button style="width:32px;height:32px;border-radius:8px;background:#31313a;border:1px solid #32323a;color:#eceae6;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
</div>
</body></html>
