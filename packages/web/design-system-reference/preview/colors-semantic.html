<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="label">Semantic · Status</div>
<div class="card-row">
  <div class="swatch"><div class="swatch-chip" style="background:#86c781"></div><div class="swatch-name">success</div><div class="swatch-val">#86C781</div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#e8b64c"></div><div class="swatch-name">warning</div><div class="swatch-val">#E8B64C</div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#e06c6c"></div><div class="swatch-name">danger</div><div class="swatch-val">#E06C6C</div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#7aafe6"></div><div class="swatch-name">info</div><div class="swatch-val">#7AAFE6</div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#b594ef"></div><div class="swatch-name">thinking</div><div class="swatch-val">#B594EF</div></div>
</div>
<div class="label" style="margin-top:14px">Left-accent bar pattern</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
  <div style="border-left:3px solid #d97757;background:#212125;padding:6px 10px;border-radius:6px;font-size:12px;color:#eceae6">tool-running</div>
  <div style="border-left:3px solid #86c781;background:#212125;padding:6px 10px;border-radius:6px;font-size:12px;color:#eceae6">tool-done</div>
  <div style="border-left:3px solid #e06c6c;background:#212125;padding:6px 10px;border-radius:6px;font-size:12px;color:#eceae6">tool-error</div>
</div>
</body></html>
