<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="label">Elevation · shadow ramp</div>
<div style="display:flex;gap:14px;padding:10px 4px">
  <div style="width:80px;height:64px;background:#212125;border:1px solid #32323a;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)">sm</div>
  <div style="width:80px;height:64px;background:#212125;border:1px solid #32323a;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)">md</div>
  <div style="width:80px;height:64px;background:#212125;border:1px solid #32323a;border-radius:10px;box-shadow:0 12px 48px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)">lg</div>
  <div style="width:80px;height:64px;background:#212125;border:1px solid #32323a;border-radius:10px;box-shadow:0 24px 96px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)">xl</div>
</div>
<div style="font-size:10px;color:var(--fg-dim);margin-top:2px">1px border + shadow — strokes do structural work.</div>
</body></html>
