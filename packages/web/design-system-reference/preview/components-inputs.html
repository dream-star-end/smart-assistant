<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="label">Input · textarea · focus ring</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <input placeholder="邮箱" style="background:#212125;border:1px solid #32323a;color:#eceae6;padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box"/>
  <input placeholder="focused" style="background:#212125;border:1px solid #d97757;color:#eceae6;padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;box-shadow:0 0 0 3px rgba(217,119,87,0.25)"/>
  <div style="background:#212125;border:1px solid #32323a;border-radius:14px;padding:12px 14px;display:flex;align-items:flex-end;gap:8px">
    <div contenteditable style="flex:1;color:#eceae6;font-size:15px;outline:none;min-height:20px">发消息给 agent…</div>
    <button style="background:#d97757;color:#fff;border:none;border-radius:8px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  </div>
</div>
</body></html>
